      stroke-linejoin="round"
    />
    <path
      d="M24 -18 L38 0 L24 18"
      fill="none"
      stroke="#ffffff"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M-6 24 L6 -24"
      fill="none"
      stroke="#ffffff"
      stroke-width="6"
      stroke-linecap="round"
    />
  </g>
