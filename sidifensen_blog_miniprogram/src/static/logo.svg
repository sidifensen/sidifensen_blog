      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M28 -22 L46 0 L28 22"
      fill="none"
      stroke="#ffffff"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M-8 30 L8 -30"
      fill="none"
      stroke="#ffffff"
      stroke-width="10"
      stroke-linecap="round"
    />
  </g>
</svg>
